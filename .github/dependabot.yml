version: 2
updates:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "monthly"
      commit-message:
        prefix: "ci(deps)"
      cooldown:
        default-days: 7
    - package-ecosystem: "cargo"
      directory: "/"
      schedule:
          interval: "monthly"
      cooldown:
        default-days: 7
